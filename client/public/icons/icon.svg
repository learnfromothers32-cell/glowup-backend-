<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="50%" style="stop-color:#e11d48"/>
      <stop offset="100%" style="stop-color:#be123c"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background rounded rectangle -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Subtle shine overlay -->
  <rect width="512" height="256" rx="108" ry="108" fill="url(#shine)"/>
  <!-- Sparkle accent top-left -->
  <circle cx="95" cy="95" r="4" fill="rgba(255,255,255,0.5)"/>
  <circle cx="130" cy="70" r="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="70" cy="130" r="2.5" fill="rgba(255,255,255,0.35)"/>
  <!-- Main letter G -->
  <text x="256" y="310" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="260" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-8">G</text>
  <!-- Small sparkle dot bottom-right -->
  <circle cx="420" cy="420" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="400" cy="445" r="1.5" fill="rgba(255,255,255,0.25)"/>
</svg>
