services:
  mongo:
    image: mongo:7
    container_name: startup_mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: startup
      MONGO_INITDB_ROOT_PASSWORD: startup_dev_pass
      MONGO_INITDB_DATABASE: startup
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis/redis-stack:latest
    container_name: startup_redis
    restart: unless-stopped
    command: redis-server --requirepass startup_redis_pass
    ports:
      - "6380:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: startup_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://startup:startup_dev_pass@mongo:27017/startup?authSource=admin
      REDIS_URL: redis://:startup_redis_pass@redis:6379
      CLIENT_URL: http://localhost:5173
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - mongo
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: startup_client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://server:5000
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
      VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server

volumes:
  mongo_data:
  redis_data:
