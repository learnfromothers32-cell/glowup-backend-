server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hide Nginx version
  server_tokens off;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Permissions-Policy "camera=(), microphone=(), payment=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.paystack.co 'unsafe-inline'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://api.paystack.co; frame-src https://standard.paystack.com;" always;

  # SPA: never cache HTML — always revalidate so users get latest index.html after deploy
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # Cache static assets (JS/CSS with Vite hashes) aggressively
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location /api {
    # Match server MAX_UPLOAD_SIZE_MB (default 100M)
    client_max_body_size 100M;
    proxy_pass http://server:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  location /uploads {
    # Match server MAX_UPLOAD_SIZE_MB (default 100M)
    client_max_body_size 100M;
    proxy_pass http://server:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io {
    proxy_pass http://server:5000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
  }
}
