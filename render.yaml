services:
  - type: web
    name: glowup-backend
    env: node
    rootDir: server
    buildCommand: npm ci --omit=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/hello
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: MAX_UPLOAD_SIZE_MB
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
