version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: startup_mongo_prod
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: startup
    volumes:
      - mongo_data_prod:/data/db

  redis:
    image: redis/redis-stack:latest
    container_name: startup_redis_prod
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: startup_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/startup?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CLIENT_URL: http://localhost
    depends_on:
      - mongo
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: startup_client
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://server:5000/api/v1
      VITE_SOCKET_URL: http://server:5000
    depends_on:
      - server

volumes:
  mongo_data_prod:
  redis_data_prod:
