services:
  - type: web
    name: glowup-backend
    env: node
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/hello
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: SENTRY_DSN
        value: https://1070fc8faab3ace4632e09d63aa3b3d2@o4511657385000960.ingest.us.sentry.io/4511657392472064
      - key: VITE_SENTRY_DSN
        value: https://1070fc8faab3ace4632e09d63aa3b3d2@o4511657385000960.ingest.us.sentry.io/4511657392472064
